<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luca's Wine Diary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --wine: #6B1D1D; --gold: #C9A84C;
  --cream: #FAF7F2; --text: #2C1810; --muted: #8B7355;
  --border: rgba(107,29,29,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

header { background: var(--wine); padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo-top { font-size: 0.6rem; font-weight: 300; color: rgba(255,255,255,0.45); letter-spacing: 0.25em; text-transform: uppercase; }
.logo-main { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 400; color: #FAF7F2; letter-spacing: 0.02em; }
.logo-main em { color: var(--gold); font-style: italic; }

main { max-width: 900px; margin: 0 auto; padding: 1.75rem 1.5rem; }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.85rem; margin-bottom: 1.75rem; }
.stat-card { background: white; border-radius: 12px; padding: 1.1rem; border: 1px solid var(--border); text-align: center; }
.stat-num { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--wine); }
.stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }

.filter-row { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
.filter-btn { background: white; border: 1px solid var(--border); color: var(--muted); padding: 0.38rem 0.9rem; border-radius: 20px; cursor: pointer; font-size: 0.78rem; transition: all 0.2s; }
.filter-btn.active { background: var(--wine); color: white; border-color: var(--wine); }
.search-input { flex: 1; min-width: 180px; padding: 0.45rem 1rem; border: 1px solid var(--border); border-radius: 20px; font-size: 0.82rem; outline: none; font-family: 'DM Sans', sans-serif; background: white; }
.search-input:focus { border-color: var(--wine); }

.wine-list { display: flex; flex-direction: column; gap: 0.75rem; }
.wine-card { background: white; border-radius: 14px; border: 1px solid var(--border); padding: 1.1rem 1.25rem; display: grid; grid-template-columns: 36px 1fr auto; gap: 1rem; align-items: start; transition: box-shadow 0.2s; cursor: pointer; position: relative; }
.wine-card:hover { box-shadow: 0 3px 16px rgba(107,29,29,0.09); }
.wine-type-badge { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; margin-top: 2px; }
.badge-drunk { background: rgba(107,29,29,0.09); }
.badge-search { background: rgba(201,168,76,0.13); }
.wine-info { min-width: 0; }
.wine-name-en { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 400; color: var(--text); line-height: 1.3; }
.wine-name-ko { font-size: 0.73rem; color: var(--muted); margin-top: 0.15rem; }
.wine-meta { font-size: 0.73rem; color: var(--muted); display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.4rem; }
.wine-meta span { background: var(--cream); padding: 0.12rem 0.45rem; border-radius: 8px; }
.wine-right { text-align: right; flex-shrink: 0; }
.wine-rating { color: var(--gold); font-size: 0.75rem; }
.wine-date { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }

.delete-btn { opacity: 0; position: absolute; top: 0.7rem; right: 0.7rem; background: rgba(107,29,29,0.07); border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; color: var(--wine); font-size: 0.75rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.wine-card:hover .delete-btn { opacity: 1; }
.delete-btn:hover { background: var(--wine); color: white; }

.empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.loading { text-align: center; padding: 3rem; color: var(--muted); font-family: 'Playfair Display', serif; }

.modal-overlay { position: fixed; inset: 0; background: rgba(26,18,8,0.55); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: white; border-radius: 20px; max-width: 580px; width: 100%; max-height: 88vh; overflow-y: auto; padding: 2rem; transform: translateY(16px); transition: transform 0.25s; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-close { float: right; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--muted); }
.type-tag { display: inline-block; padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.72rem; margin-bottom: 0.75rem; }
.type-tag.drunk { background: rgba(107,29,29,0.09); color: var(--wine); }
.type-tag.search { background: rgba(201,168,76,0.15); color: #8B6914; }
.modal-wine-name { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.2rem; line-height: 1.3; }
.modal-wine-ko { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.25rem; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; margin-bottom: 1.25rem; }
.mf label { font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.2rem; }
.mf .val { font-size: 0.88rem; color: var(--text); }
.section-label { font-size: 0.67rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.45rem; margin-top: 1rem; }
.desc-block { background: var(--cream); border-radius: 10px; padding: 0.85rem 1rem; font-size: 0.82rem; color: var(--text); line-height: 1.75; }
.note-block { background: rgba(201,168,76,0.07); border-left: 2px solid var(--gold); border-radius: 0 10px 10px 0; padding: 0.85rem 1rem; font-size: 0.82rem; color: var(--text); line-height: 1.75; }
.rating-big { color: var(--gold); font-size: 1.1rem; letter-spacing: 0.08em; }
.btn-modal-close { width: 100%; padding: 0.75rem; background: var(--wine); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 1.25rem; font-family: 'DM Sans', sans-serif; }

@media (max-width: 600px) {
  header { padding: 1rem; }
  .logo-main { font-size: 1.2rem; }
  .modal-grid { grid-template-columns: 1fr; }
  .wine-card { grid-template-columns: 32px 1fr; }
  .wine-right { display: none; }
}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo-top">Luca Han</div>
    <div class="logo-main">Wine <em>Diary</em></div>
  </div>
</header>

<main>
  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="totalCount">0</div><div class="stat-label">총 와인</div></div>
    <div class="stat-card"><div class="stat-num" id="drunkCount">0</div><div class="stat-label">마신 와인</div></div>
    <div class="stat-card"><div class="stat-num" id="searchCount">0</div><div class="stat-label">관심 와인</div></div>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('drunk',this)">🍷 마신 와인</button>
    <button class="filter-btn" onclick="setFilter('search',this)">🔍 관심 와인</button>
    <input class="search-input" type="text" placeholder="와인명, 생산자, 지역 검색..." oninput="filterWines(this.value)">
  </div>
  <div class="wine-list" id="wineList"><div class="loading">불러오는 중...</div></div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="type-tag" id="mTypeTag"></div>
    <div class="modal-wine-name" id="mName"></div>
    <div class="modal-wine-ko" id="mNameKo"></div>
    <div class="modal-grid">
      <div class="mf"><label>빈티지</label><div class="val" id="mVintage"></div></div>
      <div class="mf"><label>생산자</label><div class="val" id="mProducer"></div></div>
      <div class="mf"><label>국가</label><div class="val" id="mCountry"></div></div>
      <div class="mf"><label>지역</label><div class="val" id="mRegion"></div></div>
      <div class="mf"><label>품종</label><div class="val" id="mGrape"></div></div>
      <div class="mf"><label>평점</label><div class="val rating-big" id="mRating"></div></div>
      <div class="mf"><label>날짜 · 장소</label><div class="val" id="mDate"></div></div>
      <div class="mf"><label>동반자</label><div class="val" id="mCompanion"></div></div>
    </div>
    <div class="section-label">🍷 와인 설명</div>
    <div class="desc-block" id="mDesc">-</div>
    <div class="section-label">👤 와인메이커</div>
    <div class="desc-block" id="mMaker">-</div>
    <div class="section-label">📅 빈티지 노트</div>
    <div class="desc-block" id="mVintageDesc">-</div>
    <div class="section-label">📝 개인 노트</div>
    <div class="note-block" id="mNote">-</div>
    <button class="btn-modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, getDocs, deleteDoc, doc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCbp1DLlRr9BXfI9aa9P0U04h8Ck1Xs6KQ",
  authDomain: "luca-s-wine-list.firebaseapp.com",
  projectId: "luca-s-wine-list",
  storageBucket: "luca-s-wine-list.firebasestorage.app",
  messagingSenderId: "877077090227",
  appId: "1:877077090227:web:13f0ca227df4ebc5e785c6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let allWines = [], currentFilter = 'all', currentSearch = '';

function getNameParts(name) {
  const m = name.match(/^(.+?)\s*\(([^)]+)\)/);
  return m ? { en: m[1].trim(), ko: m[2].trim() } : { en: name, ko: '' };
}

async function loadWines() {
  try {
    const snap = await getDocs(query(collection(db, 'wines'), orderBy('date', 'desc')));
    allWines = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats(); renderWines();
  } catch(e) {
    document.getElementById('wineList').innerHTML = '<div class="loading">데이터를 불러올 수 없습니다.</div>';
  }
}

function updateStats() {
  document.getElementById('totalCount').textContent = allWines.length;
  document.getElementById('drunkCount').textContent = allWines.filter(w => w.type==='drunk').length;
  document.getElementById('searchCount').textContent = allWines.filter(w => w.type==='search').length;
}

function renderWines() {
  const list = document.getElementById('wineList');
  let wines = allWines;
  if (currentFilter !== 'all') wines = wines.filter(w => w.type === currentFilter);
  if (currentSearch) {
    const s = currentSearch.toLowerCase();
    wines = wines.filter(w => (w.wine_name||'').toLowerCase().includes(s) || (w.producer||'').toLowerCase().includes(s) || (w.region||'').toLowerCase().includes(s));
  }
  if (!wines.length) { list.innerHTML = '<div class="empty"><div style="font-size:2.5rem">🍷</div><p style="margin-top:1rem;font-family:Playfair Display,serif">아직 기록된 와인이 없어요</p></div>'; return; }
  list.innerHTML = wines.map(w => {
    const { en, ko } = getNameParts(w.wine_name || '');
    return `<div class="wine-card" onclick="showDetail('${w.id}')">
      <div class="wine-type-badge ${w.type==='drunk'?'badge-drunk':'badge-search'}">${w.type==='drunk'?'🍷':'🔍'}</div>
      <div class="wine-info">
        <div class="wine-name-en">${en}</div>
        ${ko?`<div class="wine-name-ko">${ko}</div>`:''}
        <div class="wine-meta"><span>${w.vintage||'NV'}</span>${w.producer?`<span>${w.producer}</span>`:''}${w.region?`<span>${w.region}</span>`:''}</div>
      </div>
      <div class="wine-right">
        ${w.rating?`<div class="wine-rating">${'★'.repeat(w.rating)}</div>`:''}
        <div class="wine-date">${w.date||''}</div>
      </div>
      <button class="delete-btn" onclick="deleteWine(event,'${w.id}')">✕</button>
    </div>`;
  }).join('');
}

window.deleteWine = async function(e, id) {
  e.stopPropagation();
  if (!confirm('이 와인을 삭제할까요?')) return;
  await deleteDoc(doc(db, 'wines', id));
  allWines = allWines.filter(w => w.id !== id);
  updateStats(); renderWines();
};

window.showDetail = function(id) {
  const w = allWines.find(x => x.id === id);
  if (!w) return;
  const { en, ko } = getNameParts(w.wine_name || '');
  document.getElementById('mTypeTag').className = `type-tag ${w.type==='drunk'?'drunk':'search'}`;
  document.getElementById('mTypeTag').textContent = w.type==='drunk'?'🍷 마신 와인':'🔍 관심 와인';
  document.getElementById('mName').textContent = en;
  document.getElementById('mNameKo').textContent = ko;
  document.getElementById('mVintage').textContent = w.vintage||'NV';
  document.getElementById('mProducer').textContent = w.producer||'-';
  document.getElementById('mCountry').textContent = w.country||'-';
  document.getElementById('mRegion').textContent = w.region||'-';
  document.getElementById('mGrape').textContent = w.grape||'-';
  document.getElementById('mRating').textContent = w.rating?'★'.repeat(w.rating)+'☆'.repeat(5-w.rating):'미평가';
  document.getElementById('mDate').textContent = [w.date,w.place].filter(Boolean).join(' · ')||'-';
  document.getElementById('mCompanion').textContent = w.companion||'-';
  document.getElementById('mDesc').textContent = w.description||'-';
  document.getElementById('mMaker').textContent = w.maker_description||'-';
  document.getElementById('mVintageDesc').textContent = w.vintage_description||'-';
  document.getElementById('mNote').textContent = w.note||'노트 없음';
  document.getElementById('modalOverlay').classList.add('open');
};

window.closeModal = function(e) {
  if (!e || e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open');
};
window.setFilter = function(f, btn) { currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderWines(); };
window.filterWines = function(s) { currentSearch=s; renderWines(); };

loadWines();
</script>
</body>
</html>
